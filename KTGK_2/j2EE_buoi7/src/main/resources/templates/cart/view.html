<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div layout:fragment="content" class="container mt-4">
    <h2 class="mb-4">Giỏ hàng của bạn</h2>
    <div th:if="${#lists.isEmpty(cart)}" class="alert alert-info">Chưa có sản phẩm nào trong giỏ hàng.</div>
    <div th:unless="${#lists.isEmpty(cart)}">
        <table class="table table-bordered align-middle">
            <thead class="table-light">
            <tr>
                <th>Tên sản phẩm</th>
                <th>Giá</th>
                <th>Số lượng</th>
                <th>Tổng tiền</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cart}">
                <td th:text="${item.product.name}"></td>
                <td th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                <td th:text="${item.quantity}"></td>
                <td th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
            </tr>
            </tbody>
            <tfoot>
            <tr>
                <th colspan="3" class="text-end">Tổng cộng</th>
                <th th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></th>
            </tr>
            </tfoot>
        </table>
            <form th:action="@{/cart/checkout}" method="post" class="mb-3">
                 <a th:href="@{/cart/checkout}" class="btn btn-success">Đặt hàng</a>
            </form>
    </div>
    <a href="/products" class="btn btn-secondary">Tiếp tục mua hàng</a>
</div>
</body>
</html>
