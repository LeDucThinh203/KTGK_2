<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Đơn hàng của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div layout:fragment="content" class="container mt-4">
    <h2 class="mb-4">Đơn hàng của tôi</h2>
    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">Bạn chưa có đơn hàng nào.</div>
    <div th:unless="${#lists.isEmpty(orders)}">
        <table class="table table-bordered align-middle">
            <thead class="table-light">
            <tr>
                <th>Mã đơn hàng</th>
                <th>Ngày đặt</th>
                <th>Tổng tiền</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                <td>
                    <a th:href="@{/order/detail/{id}(id=${order.id})}" class="btn btn-primary btn-sm">Xem chi tiết</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <a href="/products" class="btn btn-secondary">Tiếp tục mua hàng</a>
</div>
</body>
</html>
