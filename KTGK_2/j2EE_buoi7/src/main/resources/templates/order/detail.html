<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div layout:fragment="content" class="container mt-4">
    <h2 class="mb-4">Chi tiết đơn hàng</h2>
    <div th:if="${order != null}">
        <p><strong>Mã đơn hàng:</strong> <span th:text="${order.id}"></span></p>
        <p><strong>Ngày đặt:</strong> <span th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></span></p>
        <p><strong>Khách hàng:</strong> <span th:text="${customerInfo.loginName}"></span></p>
        <p><strong>Địa chỉ:</strong> <span th:text="${customerInfo.address}"></span></p>
        <p><strong>Số điện thoại:</strong> <span th:text="${customerInfo.phone}"></span></p>
        <p><strong>Email:</strong> <span th:text="${customerInfo.email}"></span></p>
        <table class="table table-bordered align-middle mt-4">
            <thead class="table-light">
            <tr>
                <th>Tên sản phẩm</th>
                <th>Giá</th>
                <th>Số lượng</th>
                <th>Tổng tiền</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="detail : ${order.orderDetails}">
                <td th:text="${detail.product.name}"></td>
                <td th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                <td th:text="${detail.quantity}"></td>
                <td th:text="${#numbers.formatDecimal(detail.price * detail.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
            </tr>
            </tbody>
            <tfoot>
            <tr>
                <th colspan="3" class="text-end">Tổng cộng</th>
                <th th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></th>
            </tr>
            </tfoot>
        </table>
    </div>
    <a href="/products" class="btn btn-primary">Tiếp tục mua hàng</a>
</div>
</body>
</html>
